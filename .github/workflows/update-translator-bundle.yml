name: Update translator bundle

# Auto-rebuilds the Postman → Bruno translator bundle whenever a newer
# version of @usebruno/converters is published. Opens a PR with the bumped
# package.json + rebuilt JS asset so a reviewer can sanity-check the
# preview deploy before merging.
#
# See public/translator-bundle/README.md for context.

on:
  schedule:
    # Runs every Monday at 09:00 UTC. Adjust as needed.
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read current @usebruno/converters version
        id: current
        run: |
          CURRENT=$(node -p "require('./public/translator-bundle/package.json').dependencies['@usebruno/converters']")
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Install latest @usebruno/converters in the bundle
        working-directory: public/translator-bundle
        run: |
          npm install @usebruno/converters@latest --save
          npm install

      - name: Read new @usebruno/converters version
        id: latest
        run: |
          LATEST=$(node -p "require('./public/translator-bundle/package.json').dependencies['@usebruno/converters']")
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Skip if no version change
        id: changed
        run: |
          if [ "${{ steps.current.outputs.version }}" = "${{ steps.latest.outputs.version }}" ]; then
            echo "result=false" >> "$GITHUB_OUTPUT"
          else
            echo "result=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Rebuild translator bundle
        if: steps.changed.outputs.result == 'true'
        working-directory: public/translator-bundle
        run: npm run build

      - name: Open pull request
        if: steps.changed.outputs.result == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/update-translator-bundle
          commit-message: |
            chore(translator): update @usebruno/converters to ${{ steps.latest.outputs.version }}

            Auto-generated by .github/workflows/update-translator-bundle.yml.
            Rebuilds public/js/bruno-translator/bruno-translator.js against the
            newly published @usebruno/converters version so the docs translator
            stays in lockstep with the actual Bruno app's Postman import logic.
          title: 'chore(translator): update @usebruno/converters to ${{ steps.latest.outputs.version }}'
          body: |
            This PR was opened automatically by the **Update translator bundle** workflow.

            - **Previous version:** `${{ steps.current.outputs.version }}`
            - **New version:** `${{ steps.latest.outputs.version }}`

            What changed:
            1. `public/translator-bundle/package.json` — bumped `@usebruno/converters`
            2. `public/translator-bundle/package-lock.json` — regenerated lockfile
            3. `public/js/bruno-translator/bruno-translator.js` — rebuilt browser bundle

            ### Reviewer checklist
            - [ ] Open the Mintlify preview deploy
            - [ ] Visit `/get-started/import-export-data/script-translator`
            - [ ] Paste a sample Postman script and confirm the Bruno output looks correct
            - [ ] Merge if good

            See [`public/translator-bundle/README.md`](../tree/main/public/translator-bundle/README.md) for context.
          add-paths: |
            public/translator-bundle/package.json
            public/translator-bundle/package-lock.json
            public/js/bruno-translator/bruno-translator.js
          delete-branch: true
